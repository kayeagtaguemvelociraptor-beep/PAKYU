<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do Not Click</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    color: white;
    text-align: center;
  }

  button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: red;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: darkred;
  }

  /* JUMPSCARE SCREEN */
  #scare {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: red;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
    animation: flash 0.2s infinite;
  }

  #scare h1 {
    font-size: 4em;
    color: black;
  }

  #scare p {
    font-size: 2em;
    color: black;
  }

  @keyframes flash {
    0% { background: red; }
    50% { background: white; }
    100% { background: red; }
  }
</style>
</head>

<body>

<div>
  <h1>⚠️ DO NOT CLICK ⚠️</h1>
  <button onclick="trigger()">CLICK AT YOUR OWN RISK</button>
</div>

<div id="scare">
  <h1>😱</h1>
  <p>JOK LANG!!!</p>
</div>

<script>
function trigger() {
  const scare = document.getElementById("scare");
  scare.style.display = "flex";

  // optional auto close
  setTimeout(() => {
    scare.style.display = "none";
  }, 3000);
}
</script>

</body>
</html>
